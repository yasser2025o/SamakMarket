name: Update World Clocks (Shields Edition)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Les runners forcent déjà le passage à Node 24 ici

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Mise à niveau vers Node.js 24 pour supprimer le warning

      - name: Generate Badges and Update README
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Configuration du formatage de l'heure
            const options = { hour: '2-digit', minute: '2-digit', hour12: false };

            const tokyo = new Date().toLocaleTimeString('fr-FR', { ...options, timeZone: 'Asia/Tokyo' });
            const tanger = new Date().toLocaleTimeString('fr-FR', { ...options, timeZone: 'Africa/Casablanca' });
            const newyork = new Date().toLocaleTimeString('fr-FR', { ...options, timeZone: 'America/New_York' });
            const singapour = new Date().toLocaleTimeString('fr-FR', { ...options, timeZone: 'Asia/Singapore' });
            
            // Formatage de la date de mise à jour (UTC)
            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            const dateUTC = `${pad(now.getUTCDate())}/${pad(now.getUTCMonth() + 1)}/${now.getUTCFullYear()}`;
            const timeUTC = `${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}`;
            const dateUpdate = `${dateUTC} ${timeUTC} UTC`;

            const cleanLabel = (text) => encodeURIComponent(text).replace(/-/g, '--');

            // --- RECONSTRUCTION DU BLOC TEXTE DARK ---
            let content = `<div align="center">\n`;
            content += `  <img src="https://img.shields.io/badge/${cleanLabel('🇲🇦 Tanger')}-${tanger}-111111?style=for-the-badge&labelColor=21262d" alt="Tanger" />\n`;
            content += `  <img src="https://img.shields.io/badge/${cleanLabel('🗼 Tokyo')}-${tokyo}-111111?style=for-the-badge&labelColor=21262d" alt="Tokyo" />\n`;
            content += `  <img src="https://img.shields.io/badge/${cleanLabel('🇸🇬 Singapour')}-${singapour}-111111?style=for-the-badge&labelColor=21262d" alt="Singapour" />\n`;
            content += `  <img src="https://img.shields.io/badge/${cleanLabel('🗽 New York')}-${newyork}-111111?style=for-the-badge&labelColor=21262d" alt="New York" />\n`;
            content += `  <br />\n`;
            content += `  <sub><i>Dernière mise à jour : ${dateUpdate}</i></sub>\n\n`;
            
            content += `  <br />\n`;
            content += `  <h3>📬 Connect with me</h3>\n`;
            content += `  <a href="mailto:votre.email@example.com"><img src="https://img.shields.io/badge/Email-111111?style=for-the-badge&logo=gmail&logoColor=white" alt="Email" /></a>\n`;
            content += `  <a href="https://linkedin.com/in/votre-profil" target="_blank"><img src="https://img.shields.io/badge/LinkedIn-111111?style=for-the-badge&logo=linkedin&logoColor=white" alt="LinkedIn" /></a>\n`;
            content += `  <a href="https://github.com/votre-username" target="_blank"><img src="https://img.shields.io/badge/GitHub-111111?style=for-the-badge&logo=github&logoColor=white" alt="GitHub" /></a>\n`;
            content += `</div>`;

            let readme = fs.readFileSync('README.md', 'utf8');
            const startMarker = '';
            const endMarker = '';
            
            const regex = new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`);
            const newContent = `${startMarker}\n${content}\n${endMarker}`;
            
            readme = readme.replace(regex, newContent);
            fs.writeFileSync('README.md', readme, 'utf8');

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "chore: update world clocks badges to node 24 [skip ci]"
          git push
