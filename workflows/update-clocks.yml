name: Update World Clocks (Shields Fixed)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate Badges and Update README
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Formater l'heure de façon simple (HH:mm)
            const options = { hour: '2-digit', minute: '2-digit', hour12: false };

            const tokyo = new Date().toLocaleTimeString('fr-FR', { ...options, timeZone: 'Asia/Tokyo' });
            const tanger = new Date().toLocaleTimeString('fr-FR', { ...options, timeZone: 'Africa/Casablanca' });
            const newyork = new Date().toLocaleTimeString('fr-FR', { ...options, timeZone: 'America/New_York' });
            const singapour = new Date().toLocaleTimeString('fr-FR', { ...options, timeZone: 'Asia/Singapore' });
            
            // Formatage propre de la date UTC
            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            const dateUTC = `${pad(now.getUTCDate())}/${pad(now.getUTCMonth() + 1)}/${now.getUTCFullYear()}`;
            const timeUTC = `${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}`;
            const dateUpdate = `${dateUTC} ${timeUTC} UTC`;

            // Fonction robuste pour générer l'URL Query String de Shields.io sans casser avec les emojis
            const makeBadgeUrl = (label, time) => {
              const encodedLabel = encodeURIComponent(label);
              const encodedTime = encodeURIComponent(time);
              return `https://img.shields.io/static/v1?label=${encodedLabel}&message=${encodedTime}&color=111111&labelColor=21262d&style=for-the-badge`;
            };

            // --- RECONSTRUCTION DU BLOC TEXTE ---
            let content = `<div align="center">\n`;
            content += `  <img src="${makeBadgeUrl('🇲🇦 Tanger', tanger)}" alt="Tanger" />\n`;
            content += `  <img src="${makeBadgeUrl('🗼 Tokyo', tokyo)}" alt="Tokyo" />\n`;
            content += `  <img src="${makeBadgeUrl('🇸🇬 Singapour', singapour)}" alt="Singapour" />\n`;
            content += `  <img src="${makeBadgeUrl('🗽 New York', newyork)}" alt="New York" />\n`;
            content += `  <br />\n`;
            content += `  <sub><i>Dernière mise à jour : ${dateUpdate}</i></sub>\n\n`;
            
            content += `  <br />\n`;
            content += `  <h3>📬 Connect with me</h3>\n`;
            content += `  <a href="mailto:votre.email@example.com"><img src="https://img.shields.io/badge/Email-111111?style=for-the-badge&logo=gmail&logoColor=white" alt="Email" /></a>\n`;
            content += `  <a href="https://linkedin.com/in/votre-profil" target="_blank"><img src="https://img.shields.io/badge/LinkedIn-111111?style=for-the-badge&logo=linkedin&logoColor=white" alt="LinkedIn" /></a>\n`;
            content += `  <a href="https://github.com/votre-username" target="_blank"><img src="https://img.shields.io/badge/GitHub-111111?style=for-the-badge&logo=github&logoColor=white" alt="GitHub" /></a>\n`;
            content += `</div>`;

            let readme = fs.readFileSync('README.md', 'utf8');
            const startMarker = '';
            const endMarker = '';
            
            const regex = new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`);
            const newContent = `${startMarker}\n${content}\n${endMarker}`;
            
            readme = readme.replace(regex, newContent);
            fs.writeFileSync('README.md', readme, 'utf8');

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "chore: fix and update world clocks badges [skip ci]"
          git push
