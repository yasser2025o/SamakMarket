name: Update World Clocks

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Clocks Text
        run: |
          # Récupération des heures et des dates du jour
          TOKYO=$(TZ="Asia/Tokyo" date +"%H:%M")
          TANGER=$(TZ="Africa/Casablanca" date +"%H:%M")
          NEWYORK=$(TZ="America/New_York" date +"%H:%M")
          SINGAPOUR=$(TZ="Asia/Singapore" date +"%H:%M")
          DATE_UPDATE=$(TZ="Africa/Casablanca" date +"%d/%m/%Y à %H:%M (Heure Maroc)")

          # Construction d'un tableau de texte Markdown pur (sans image externe)
          HTML_CONTENT="<div align=\"center\">\n\n"
          HTML_CONTENT+="| 🗼 TOKYO | 🇲🇦 TANGER | 🗽 NEW YORK | 🇸🇬 SINGAPOUR |\n"
          HTML_CONTENT+="| :---: | :---: | :---: | :---: |\n"
          HTML_CONTENT+="| **$TOKYO** | **$TANGER** | **$NEWYORK** | **$SINGAPOUR** |\n\n"
          HTML_CONTENT+="<sub>*Dernière synchronisation : $DATE_UPDATE*</sub>\n"
          HTML_CONTENT+="</div>"

          # Injection dans le README
          sed -i "/<!-- START_SECTION:clocks -->/,/<!-- END_SECTION:clocks -->/{//!d}" README.md
          sed -i "/<!-- START_SECTION:clocks -->/r "<(echo -e "$HTML_CONTENT")"" README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "chore: update world clocks to text [skip ci]"
          git push
